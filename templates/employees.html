{% extends "base.html" %}
{% block content %}
<section class="card">
  <h1>Employees</h1>
  <form method="post" class="add-employee">
    <input type="hidden" name="action" value="add">
    <input name="name" placeholder="Employee name" required>
    <select name="role_id">
      {% for role in roles %}<option value="{{ role.id }}">{{ role.title }} {{ role.subtitle }}</option>{% endfor %}
    </select>
    <button type="submit">Add Employee</button>
  </form>
</section>

<section class="card">
  <h2>Edit employee list</h2>
  <div class="employee-grid">
    {% for emp in employees %}
      <form method="post" class="employee-row">
        <input type="hidden" name="action" value="update">
        <input type="hidden" name="employee_id" value="{{ emp.id }}">
        <input name="name" value="{{ emp.name }}">
        <select name="role_id">
          {% for role in roles %}
            <option value="{{ role.id }}" {% if role.id == emp.role_id %}selected{% endif %}>{{ role.title }} {{ role.subtitle }}</option>
          {% endfor %}
        </select>
        <label><input type="checkbox" name="active" {% if emp.active %}checked{% endif %}> Active</label>
        <input class="order" type="number" name="display_order" value="{{ emp.display_order }}" title="Display order">
        <button type="submit">Save</button>
      </form>
    {% endfor %}
  </div>
</section>
{% endblock %}
