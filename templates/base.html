<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gaucho Schedule</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/app-ui.css">
</head>
<body>
<header class="topbar">
  <div>
    <a class="brand" href="/">Gaucho Schedule</a>
    <span class="muted">local weekly schedule editor</span>
  </div>
  <nav>
    <a href="/">Weeks</a>
    <a href="/employees">Employees</a>
    <a href="/import-history">Import History</a>
    <a href="/preferences">Preferences</a>
  </nav>
</header>
<main class="page">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash">
        {% for message in messages %}<div>{{ message }}</div>{% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
<script src="/static/app.js"></script>
</body>
</html>
